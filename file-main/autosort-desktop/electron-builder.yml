appId: com.autosort.desktop
productName: Autosort Desktop
directories:
  output: release
files:
  - dist/**/*
  - rules/**/*
  - assets/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - arm64
        - x64
  icon: assets/icons/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
